<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真剣のスルーメ</title>

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
.screen{display:none;padding:10px;text-align:center}
.active{display:block}

.fire{border:3px solid #ff4444}
.water{border:3px solid #4488ff}
.thunder{border:3px solid #ffd700}
.wood{border:3px solid #44cc44}

.card{
display:inline-block;
background:#1a1f2e;
padding:6px;margin:5px;
border-radius:10px;width:95px;
}
.card img{width:100%;border-radius:8px}
.ssr{box-shadow:0 0 20px gold}

.rarity{
font-size:12px;
color:gold;
font-weight:bold;
margin-bottom:2px;
}

.flash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
animation:flash 0.6s;
}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

.flip{position:relative;width:90px;height:120px;transform-style:preserve-3d;transition:0.6s}
.open .flip{transform:rotateY(180deg)}
.front,.back{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;border-radius:10px;
}
.front{background:#444}
.back{transform:rotateY(180deg);background:#1a1f2e}

#battleMain{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
max-width:520px;
margin:auto;
}

.teamArea{
display:flex;
flex-direction:column;
gap:8px;
width:40%;
align-items:center;
}

#enemyArea{
width:55%;
display:flex;
justify-content:center;
}

.unit{
background:#1a1f2e;
padding:6px;
border-radius:12px;
font-size:11px;
position:relative;
}

.ally{width:140px;}
.unit img{
width:100%;
max-height:90px;
object-fit:cover;
border-radius:8px;
}

.enemy{width:160px;}

.turn{
outline:2px solid yellow;
box-shadow:0 0 6px yellow;
}

.bar{background:#333;height:8px;border-radius:5px;margin-top:3px;}
.hp{background:#4caf50;height:8px;}
.gauge{background:#ff9800;height:6px;}

.damage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
font-size:28px;
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #000,0 0 5px #000;
animation:damagePop 0.9s forwards;
pointer-events:none;
}

@keyframes damagePop{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
20%{opacity:1;transform:translate(-50%,-60%) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-100%) scale(0.8);}
}

.weak{color:#ff4444}
.resist{color:#44aaff}
.rainbowFlash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple);
opacity:0.8;
animation:rainbow 0.8s forwards;
z-index:999;
}

@keyframes rainbow{
0%{opacity:1;}
100%{opacity:0;}
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-5px,5px);}
50%{transform:translate(5px,-5px);}
75%{transform:translate(-5px,5px);}
100%{transform:translate(0,0);}
}

.ultra{
box-shadow:0 0 25px cyan,0 0 40px magenta;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

.eventFlash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#ff00cc,#3333ff,#00ffff);
opacity:0.8;
animation:eventFlash 0.8s forwards;
z-index:999;
}

@keyframes eventFlash{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(1.2);}
}

.banner{
animation:bannerGlow 1.5s infinite alternate;
}
@keyframes bannerGlow{
from{filter:brightness(1);}
to{filter:brightness(1.3);}
}

#gameTitle{
  width: 400px;   /* 好きなサイズに変更 */
  height: auto;   /* 縦横比維持 */
}

</style>

function applyTeamBuff(players){

let buff = getTeamBuff(players); // ←これ追加

return players.map(p=>{
    return {
        ...p,
        atk: Math.floor(p.atk * (1 + buff.atk / 100)),
        hp: Math.floor(p.hp * (1 + buff.hp / 100)),
        currentHp: Math.floor(p.hp * (1 + buff.hp / 100)),
        ult: 0,
        cool: 0
    };
});
}

function saveData(){
const data = {
stone,
box,
team,
progress
};
localStorage.setItem("gachaData", JSON.stringify(data));
}

function loadData(){
const data = JSON.parse(localStorage.getItem("gachaData"));
if(!data) return;

stone = data.stone ?? 100;
box = data.box ?? [];
team = data.team ?? [];
progress = data.progress ?? {};
}

function star(r){return "★".repeat(r);}

function getGachaChar(){
let r=Math.random();
let rarity;

if(r < 0.70) rarity = 1;
else if(r < 0.90) rarity = 2;
else if(r < 0.99)rarity = 3;
else rarity =4;

// 🔥通常キャラだけ
let pool = chars.filter(c=>c.rarity==rarity);

return pool[Math.random()*pool.length|0];
}

function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
update();
if(id==="trial")renderTrials();
}
function draw1(){
if(stone < 10) return;
stone -= 10;

gachaResult.innerHTML="";

// 演出
let flash=document.createElement("div");
flash.className="flash";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),600);

// キャラ取得
let c = getGachaChar();

// 表示
// ☆4専用演出
if(c.rarity === 4){

// 虹フラッシュ
let rainbow=document.createElement("div");
rainbow.className="rainbowFlash";
document.body.appendChild(rainbow);
setTimeout(()=>rainbow.remove(),800);

// 画面揺れ
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);

update();
saveData();

}
let div=document.createElement("div");
div.className=`card ${attrClass[c.attr]}`;
div.innerHTML=`
<div class="flip">
<div class="front"></div>
<div class="back ${c.rarity==3?"ssr":""}">
<div class="rarity">${star(c.rarity)}</div>
<img src="${c.img}">
${c.name}
</div>
</div>`;
gachaResult.appendChild(div);
setTimeout(()=>div.classList.add("open"),50);

// BOX処理（凸含む）
let exist=box.find(b=>b.name===c.name);
if(exist){
exist.dupe++;

// レアごとの上昇量
let atkUp=0,hpUp=0;

if(exist.rarity===1){
    atkUp=2; hpUp=5;
}else if(exist.rarity===2){
    atkUp=4; hpUp=10;
}else if(exist.rarity===3){
    atkUp=8; hpUp=20;
}else if(exist.rarity===4){
    atkUp=64; hpUp=160;
}
exist.atk += atkUp;
exist.hp += hpUp;

}else{
box.push({...c,dupe:0,atk:20+5*c.rarity,hp:100+20*c.rarity});
}

update();
}

function draw10(){
if(stone<100)return;

let flash=document.createElement("div");
flash.className="flash";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),600);

let results=[];

for(let i=0;i<9;i++){
results.push(getGachaChar());

update();
saveData();
}

results.forEach((c,i)=>{

document.body.appendChild(rainbow);

document.body.classList.add("shake");

</div>
</div>`;
gachaResult.appendChild(div);

let exist=box.find(b=>b.name===c.name);

},i*250);
});

function sortBox(type){
if(type==="atk")box.sort((a,b)=>b.atk-a.atk);
if(type==="hp")box.sort((a,b)=>b.hp-a.hp);
if(type==="rarity")box.sort((a,b)=>b.rarity-a.rarity);
if(type==="dupe")box.sort((a,b)=>b.dupe-a.dupe);
update();
}

function update(){

if(s)s.textContent=stone;

let b=document.getElementById("box");
if(b)b.innerHTML=box.map((c,i)=>`
<div class="card ${attrClass[c.attr]}" onclick="add(${i})">
<div class="rarity">${star(c.rarity)}</div>
<img src="${c.img}">
${c.name}<br>
HP:${c.hp} ATK:${c.atk}<br>
凸:${c.dupe}
${c.skill ? `<br>スキル:${c.skill.text} (CT:${c.skill.cool||2})` : ""}
</div>`).join("");

let t=document.getElementById("team");
if(t)t.innerHTML=team.map((c,i)=>`
<div class="card ${attrClass[c.attr]}" onclick="remove(${i})">
<div class="rarity">${star(c.rarity)}</div>
<img src="${c.img}">
</div>`).join("");
let buffDiv = document.getElementById("teamBuff");

if(buffDiv){

let buff = getTeamBuff(team);

// バフ表示
buffDiv.innerHTML = `
チームバフ<br>
ATK +${buff.atk}%<br>
HP +${buff.hp}%
`;

// 合計表示
let totalDiv = document.getElementById("teamTotal");

if(totalDiv){

let totalHP = 0;
let totalATK = 0;

team.forEach(c=>{
    totalHP += c.hp;
    totalATK += c.atk;
});

let finalHP = Math.floor(totalHP * (1 + buff.hp/100));
let finalATK = Math.floor(totalATK * (1 + buff.atk/100));

totalDiv.innerHTML = `
合計ステータス<br>
HP: ${totalHP} → ${finalHP}<br>
ATK: ${totalATK} → ${finalATK}
`;
}

}

}

function add(i){
if(team.find(t=>t.name===box[i].name))return;
if(team.length<3)team.push(box[i]);
update();
saveData(); 
}

function remove(i){
team.splice(i,1);
update();
}

function renderTrials(){
trialList.innerHTML=chars.map((c,i)=>{
let lv=progress[i]||1;
return `<div class="card ${attrClass[c.attr]}">
<img src="${c.img}">
${c.name}<br>Lv.${lv}
<button onclick="startBattle(${i})">挑戦</button>
</div>`;
}).join("");
}
function startBattle(i){
go("battle");

let lv=progress[i]||1;

// 🔽ここ変更
players = applyTeamBuff(team.map(c=>{
    chars.find(ch => ch.name === c.name) ||
    eventChars.find(ch => ch.name === c.name);
    return {
        ...c,
        skill: c.skill
    };
}));
// 敵はそのまま
enemy={
    ...chars[i],
    hp:200+lv*80,
    maxHp:200+lv*80, // ←ここ追加🔥
    atk:20+lv*10,
    poison:0
};

turn="player";turnIndex=0;
renderBattle();
}

function calcDamage(a,d,base){
if(advantage[a]===d)return {dmg:base*1.5,type:"weak"};
if(advantage[d]===a)return {dmg:base*0.5,type:"resist"};
return {dmg:base,type:""};
}

function showDamage(id,res){
let el=document.getElementById(id);

let div=document.createElement("div");
div.className="damage";

let color="#fff";
if(res.type==="weak") color="#ff4444";
if(res.type==="resist") color="#44aaff";

div.innerHTML=`
<span style="color:${color}">
${Math.floor(res.dmg)}
</span><br>
<span class="${res.type}">${res.type.toUpperCase()}</span>
`;

el.appendChild(div);
setTimeout(()=>div.remove(),900);
}

function renderBattle(){
teamArea.innerHTML=players.map((p,i)=>`
<div class="unit ally ${attrClass[p.attr]} ${i===turnIndex?"turn":""}" id="p${i}">
<img src="${p.img}">
${p.name}<br>
${p.skill ? "★"+p.skill.text : ""}
<div>HP:${Math.floor(p.currentHp)}</div>
<div class="bar"><div class="hp" style="width:${p.currentHp/p.hp*100}%"></div></div>
<div class="bar"><div class="gauge" style="width:${p.ult}%"></div></div>
</div>`).join("");

enemyArea.innerHTML=`
<div class="unit enemy ${attrClass[enemy.attr]}" id="enemy">
<img src="${enemy.img}">
${enemy.name}
<div>HP:${Math.floor(enemy.hp)}</div>
<div class="bar"><div class="hp" style="width:${enemy.hp/enemy.maxHp*100}%"></div></div>
</div>`;

let p = players[turnIndex];

actions.innerHTML=
turn==="player"
? `<button onclick="attack()">攻撃</button>
<button onclick="skill()" ${p.cool>0?"disabled":""}>
スキル (${p.cool})
</button>
<button onclick="ultimate()">必殺</button>`
: "敵のターン";
}

function attack(){
let p=players[turnIndex];

// ★ここ追加
let atk = p.atk;
if(p.buff && p.buff.turn > 0){
    atk *= p.buff.power;
}

let res=calcDamage(p.attr,enemy.attr,atk);
enemy.hp-=res.dmg;

p.ult+=30;
showDamage("enemy",res);
endTurn();
}

function ultimate(){
let p=players[turnIndex];
if(p.ult<100)return;

// ★ここ追加
let atk = p.atk;
if(p.buff && p.buff.turn > 0){
    atk *= p.buff.power;
}

let res=calcDamage(p.attr,enemy.attr,atk*3);
enemy.hp-=res.dmg;

p.ult=0;
showDamage("enemy",res);
endTurn();
}

players.forEach(p=>{
    if(p.buff && p.buff.turn > 0){
        p.buff.turn--;
        if(p.buff.turn === 0){
            p.atk /= p.buff.power; // 元に戻す🔥
        }
    }
});

function enemyTurn(){

// 💀 敵の毒
if(enemy.poison && enemy.poison.turn > 0){

    let dmg = enemy.poison.user.atk * enemy.poison.power;


    enemy.hp -= dmg;
    enemy.poison.turn--;

    // 🔥 これを追加！！
    if(enemy.hp <= 0){
        win();
        return;
    }
}

// 💀 味方の毒
players.forEach(p=>{
    if(p.poison > 0){
        p.currentHp -= 10;
        p.poison--;
    }
});
let t=players[Math.random()*players.length|0];
let res=calcDamage(enemy.attr,t.attr,enemy.atk);
t.currentHp-=res.dmg;
showDamage("p"+players.indexOf(t),res);



players=players.filter(p=>p.currentHp>0);
if(players.length===0){
alert("敗北");
go("trial"); // ←追加
return;
}

turn="player";turnIndex=0;
renderBattle();
}

players.forEach(p=>{
    if(p.cool > 0) p.cool--;
});

function endTurn(){
let p = players[turnIndex];
if(p.cool > 0) p.cool--;

if(enemy.hp<=0)return win();

turnIndex++;
if(turnIndex>=players.length){
turn="enemy";
setTimeout(enemyTurn,700);
turnIndex=0;
}
renderBattle();
}

function win(){
stone+=50;
let id=chars.findIndex(c=>c.name===enemy.name);
progress[id]=(progress[id]||1)+1;
saveData();
alert("勝利！石+50");
go("trial");
}

function resetData(){
localStorage.removeItem("gachaData");
location.reload();
}

loadData();
update();

function getTeamBuff(team){
let atkBuff = 0;
let hpBuff = 0;

team.forEach(c=>{
    if(c.rarity === 4){
        atkBuff += 0.30;
        hpBuff += 0.30;
    }else if(c.rarity === 3){
        atkBuff += 0.15;
        hpBuff += 0.15;
    }
});

// 必要なら上限
// atkBuff = Math.min(atkBuff, 0.5);
// hpBuff = Math.min(hpBuff, 0.5);

return {
    atk: Math.floor(atkBuff * 100),
    hp: Math.floor(hpBuff * 100)
};
}

function skill(){
let p = players[turnIndex];
if(p.cool > 0) return;
if(!p.skill) return;

let s = p.skill;

// ★ これ追加
let atk = p.atk;
if(p.buff && p.buff.turn > 0){
    atk *= p.buff.power;
}

// 🔥 ダメージ


if(s.type==="damage"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;
    showDamage("enemy", res);
}

// 🔥 多段
if(s.type==="multi"){
    for(let i=0;i<s.hits;i++){
        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;
        showDamage("enemy", res);
        enemy.atk *= 0.9;
    }
}

// 💚 回復
if(s.type==="heal"){
    players.forEach(t=>{
        t.currentHp += t.hp * s.power;
        if(t.currentHp > t.hp) t.currentHp = t.hp;
    });
}

// 🔺 バフ
if(s.type==="buff"){
    p.atk *= s.power;
}

// 🔻 デバフ
if(s.type==="debuff"){
    enemy.atk *= s.power;
}

if(s.type==="poison"){
    enemy.poison = {
        turn: 3,
        power: s.power,   // 何%
        user: p        // 誰のATKか🔥
    };
}

if(s.type==="teamBuff"){
    players.forEach(t=>{
        t.buff = {
            turn: 3,
            power: s.power
        };
    });
}

p.cool = s.cool || 2;

// 👇最後にまとめて

if(s.type==="drain"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;

    // 回復処理（与ダメの50%）
    let heal = res.dmg * 0.5;
    p.currentHp += heal;
    if(p.currentHp > p.hp) p.currentHp = p.hp;

    showDamage("enemy", res);
}

if(s.type==="hpCut"){
    let dmg = enemy.maxHp * s.power;
    enemy.hp -= dmg;
    showDamage("enemy",{dmg,type:""});
}

if(s.type==="double"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;
    showDamage("enemy", res);

    // 追加攻撃
    let res2 = calcDamage(p.attr, enemy.attr, atk * 0.5);
    enemy.hp -= res2.dmg;
    showDamage("enemy", res2);
}

endTurn();
}

function addToBox(c){
let exist = box.find(b=>b.name===c.name);

if(exist){
    exist.dupe++;

    let atkUp=0,hpUp=0;
    if(exist.rarity===1){atkUp=2;hpUp=5;}
    else if(exist.rarity===2){atkUp=4;hpUp=10;}
    else if(exist.rarity===3){atkUp=8;hpUp=20;}
    else if(exist.rarity===4){atkUp=64;hpUp=160;}

    exist.atk += atkUp;
    exist.hp += hpUp;

}else{
    box.push({
        name: c.name,
        rarity: c.rarity,
        attr: c.attr,
        img: c.img,

        // 🔥ここ超重要
        skill: c.skill ? {
            type: c.skill.type,
            power: c.skill.power,
            text: c.skill.text,
            cool: c.skill.cool
        } : {type:"none"},

        dupe:0,
        atk:20+5*c.rarity,
        hp:100+20*c.rarity
    });
}
}

function getEventChar(){
let r = Math.random();
let rarity;

// 確率
if(r < 0.70) rarity = 1;
else if(r < 0.90) rarity = 2;
else if(r < 0.99) rarity = 3;
else rarity = 4;

// ⭐☆4はイベント限定のみ
if(rarity === 4){
    let pool = eventChars.filter(c=>c.rarity === 4);

    if(pool.length === 0){
        console.warn("イベント☆4なし");
        return getGachaChar();
    }

    return pool[Math.random()*pool.length|0];
}

// ☆3以下
let pool = [
...chars.filter(c=>c.rarity === rarity),
...eventChars.filter(c=>c.rarity === rarity)
];

if(pool.length === 0){
    return getGachaChar();
}

return pool[Math.random()*pool.length|0];
}

}
